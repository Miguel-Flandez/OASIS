<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/studentInformation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/de323b5912.js" crossorigin="anonymous"></script>
    <title>Home</title>
</head>
<body>
    <header>
        <i class="fa-solid fa-bars"></i>
        <div id="left">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScYmHnuqhvzZw5T0-62u8reDZpitWgwdyZcA&s" alt="Oakwood" id="logo">
            <h3>OASIS</h3>
        </div>
        
        <h3 id="page">Student Information</h3>
        <div id="right">
            <i class="fa-solid fa-bell"></i>
            <button id="logout">Logout  </button>
        </div>
        
    </header>

    <div id="sidebar">
        <div id="sidebar-top">
        <button id="home-button">Home</button>
        <button id="opc-button">Online Payment Center</button>
        <button id="student-info-button">Student Information</button>
        <button id="profile-button">User Profile</button>
        
        </div>
    </div>

    <div id="student-information">
        <h3>Student Information</h3>
        <div id="photo-and-info">
            <img src="https://st3.depositphotos.com/6672868/13701/v/450/depositphotos_137014128-stock-illustration-user-profile-icon.jpg" alt="dp" id="student-dp">
            <div id="info-list">
                <div id="info">
                    <p>Student Number: </p>
                    <input type="text" id="student-number" placeholder="2021-12345">
                </div>
                <div id="info">
                    <p>Level: </p>
                    <input type="text" id="level">
                </div>
                <div id="info">
                    <p>First Name: </p>
                    <input type="text" id="first-name">
                </div>
                
                <div id="info">
                    <p>Last Name: </p>
                    <input type="text" id="last-name">
                </div>
                
                <div id="info">
                    <p>Gender: </p>
                    <select id="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div id="info">
                    <p>Date of Birth: </p>
                    <input type="date" id="dob">
                </div>
                
                <div id="info">
                    <p>Place of Birth: </p>
                    <input type="text" id="place-of-birth">
                </div>
                
                <div id="info">
                    <p>Address: </p>
                    <textarea id="address"></textarea>
                </div>
                
                <div id="info">
                    <p>Phone Number: </p>
                    <input type="tel" id="phone-number">
                </div>
            </div>
        </div>
    </div>

    <div id="guardian-information">
        <h3>Guardian Information</h3>
        <div id="info-list">

            <div id="info">
                <p>Father:</p>
                <input type="text" id="father">
            </div>
            
            <div id="info">
                <p>Father's Contact Number:</p>
                <input type="tel" id="father-contact">
            </div>
            
            <div id="info">
                <p>Mother:</p>
                <input type="text" id="mother">
            </div>
            
            <div id="info">
                <p>Mother's Contact Number:</p>
                <input type="tel" id="mother-contact">
            </div>
            <div id="info">
                <p>Address:</p>
                <textarea id="address"></textarea>
            </div>
        </div>
    </div>

    <button id="save" type="button">Save</button>


    <script src="../js/dashboard.js"></script>
</body>
</html>
